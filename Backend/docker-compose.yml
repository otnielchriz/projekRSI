services:
  db:
    image: postgres:16
    container_name: kerjole_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kerjole_db
    ports:
      - "5434:5432"
    volumes:
      - kerjole_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kerjole_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    container_name: kerjole_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./uploads:/app/uploads

volumes:
  kerjole_pgdata:
